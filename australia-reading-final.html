<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>澳洲故事 · 英语阅读</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--oc:#c4783a;--ea:#2c1810;--sd:#f7f1e8;--cm:#fdf8f0;--lf:#5a8a4a;--mk:#fff3cd;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans SC",sans-serif;background:var(--sd);color:var(--ea);min-height:100vh;}
/* ── HEADER ── */
header{background:var(--ea);padding:0 1rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.3);}
.logo{font-family:"Lora",serif;color:#e8c4a0;font-size:1rem;white-space:nowrap;}
.logo span{color:#fff;}
.hbtn{background:var(--oc);color:#fff;border:none;border-radius:14px;padding:.3rem .8rem;cursor:pointer;font-size:.75rem;display:flex;align-items:center;gap:.3rem;font-family:inherit;white-space:nowrap;}
.cnt{background:#fff;color:var(--oc);border-radius:8px;padding:0 4px;font-size:.68rem;font-weight:700;min-width:14px;text-align:center;}
/* ── HOME: CARD GRID ── */
#home{display:block;}
#reader{display:none;}
.home-intro{padding:1.2rem 1rem .8rem;text-align:center;}
.home-intro h2{font-family:"Lora",serif;font-size:1.2rem;color:var(--ea);margin-bottom:.3rem;}
.home-intro p{font-size:.8rem;color:#a08060;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;padding:.5rem .8rem 2rem;}
.card{background:#fff;border-radius:12px;padding:.9rem;cursor:pointer;box-shadow:0 2px 8px rgba(44,24,16,.08);border:1px solid #e8dfd0;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;}
.card:active{transform:scale(.97);}
.card-tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:.62rem;font-weight:600;color:#fff;margin-bottom:.45rem;}
.card-num{font-family:monospace;font-size:.6rem;color:#c0a888;margin-bottom:.2rem;}
.card-title{font-family:"Lora",serif;font-size:.88rem;font-weight:700;line-height:1.35;color:var(--ea);margin-bottom:.3rem;}
.card-sub{font-size:.72rem;color:#a08060;line-height:1.4;}
.card-time{font-size:.65rem;color:#c0a888;margin-top:.4rem;}
/* ── READER ── */
#reader{padding:0;}
.reader-header{background:var(--ea);padding:.7rem 1rem;display:flex;align-items:center;gap:.6rem;position:sticky;top:52px;z-index:100;}
.back-btn{background:none;border:none;color:#e8c4a0;font-size:1rem;cursor:pointer;padding:.2rem .4rem;border-radius:6px;font-family:inherit;}
.back-btn:active{background:rgba(255,255,255,.1);}
.reader-title-bar{flex:1;min-width:0;}
.reader-title-bar .rtag{font-size:.65rem;color:#e8c4a0;opacity:.7;}
.reader-title-bar .rtitle{font-family:"Lora",serif;font-size:.95rem;color:#e8c4a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.article-body{padding:1.2rem 1rem;}
.art-title{font-family:"Lora",serif;font-size:1.45rem;font-weight:700;line-height:1.3;margin-bottom:.3rem;}
.art-sub{font-style:italic;color:#7a5a3a;font-size:.88rem;margin-bottom:.7rem;}
.art-meta{font-size:.72rem;color:#a08060;padding-bottom:.7rem;border-bottom:2px solid #e8c4a0;margin-bottom:1.1rem;}
.abody{font-family:"Lora",serif;font-size:.97rem;line-height:2.05;color:#3a2015;}
.abody p{margin-bottom:1em;}
/* word highlight */
.w{cursor:pointer;border-radius:2px;-webkit-tap-highlight-color:rgba(196,120,58,.2);}
.w:hover,.w:active{background:rgba(196,120,58,.18);}
.w.mk{background:var(--mk);border-bottom:2px solid #f0a500;}
.w.sv{background:rgba(90,138,74,.15);border-bottom:2px solid var(--lf);}
/* action bar */
.abar{display:flex;gap:.5rem;margin:1rem 0 .4rem;flex-wrap:wrap;}
.abtn{background:none;border:1px solid #e8c4a0;border-radius:6px;padding:.38rem .85rem;cursor:pointer;font-family:inherit;font-size:.78rem;color:var(--oc);transition:background .15s;-webkit-tap-highlight-color:transparent;}
.abtn:active{background:var(--oc);color:#fff;}
.abtn:disabled{opacity:.5;cursor:not-allowed;}
/* translation */
.tsec{display:none;margin-top:.7rem;border-top:2px dashed #e8c4a0;padding-top:.9rem;}
.tsec.show{display:block;}
.tp{font-size:.85rem;line-height:1.9;color:#6a4a35;margin-bottom:.85em;background:rgba(196,120,58,.05);border-left:3px solid #e8c4a0;padding:.45rem .75rem;border-radius:0 6px 6px 0;}
/* article nav */
.art-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #e0d4c0;padding-bottom:2rem;}
.nav-btn{padding:.45rem .9rem;border:1px solid #e8c4a0;background:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.82rem;color:var(--oc);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.nav-btn:active{background:var(--oc);color:#fff;}
/* word popup */
.pop{position:fixed;z-index:999;background:var(--ea);color:#e8c4a0;border-radius:10px;padding:.85rem 1rem;width:270px;max-width:calc(100vw - 16px);box-shadow:0 6px 24px rgba(0,0,0,.4);display:none;font-family:"Noto Sans SC",sans-serif;}
.pw{font-family:"Lora",serif;font-size:1.1rem;color:var(--oc);font-weight:700;display:flex;align-items:center;gap:.4rem;}
.psnd{background:none;border:none;color:var(--oc);cursor:pointer;font-size:1rem;padding:0;}
.pp{font-size:.72rem;color:#aaa;margin:.12rem 0;font-family:monospace;}
.pm{font-size:.85rem;margin:.3rem 0;line-height:1.5;}
.pe{font-size:.72rem;color:#c0a888;font-style:italic;line-height:1.5;}
.pbs{display:flex;gap:.35rem;margin-top:.65rem;}
.pb{flex:1;padding:.38rem;border:none;border-radius:6px;font-family:inherit;font-size:.75rem;cursor:pointer;}
.pb.add{background:var(--oc);color:#fff;}
.pb.svd{background:var(--lf);color:#fff;}
.pb.mrk{background:rgba(255,255,255,.12);color:#ddd;border:1px solid rgba(255,255,255,.2);}
/* wordbook */
.wb{position:fixed;inset:0;background:var(--cm);z-index:300;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.wb.open{transform:translateX(0);}
.wbh{padding:.9rem 1rem;background:var(--ea);color:#e8c4a0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.wbh h3{font-family:"Lora",serif;font-size:.95rem;}
.wbx{background:none;border:none;color:#e8c4a0;font-size:1.2rem;cursor:pointer;padding:.2rem;}
.wbtabs{display:flex;border-bottom:1px solid #e0d4c0;flex-shrink:0;}
.wbtab{flex:1;padding:.6rem;border:none;background:none;font-family:inherit;font-size:.8rem;cursor:pointer;color:#a08060;border-bottom:2px solid transparent;}
.wbtab.active{color:var(--oc);border-bottom-color:var(--oc);}
.wbody{flex:1;overflow-y:auto;padding:.8rem;}
.empty{text-align:center;color:#c0a888;font-size:.82rem;padding:2rem 1rem;line-height:1.9;}
.vc{background:#fff;border:1px solid #e8dfd0;border-radius:8px;padding:.75rem;margin-bottom:.45rem;position:relative;}
.vcw{font-family:"Lora",serif;font-size:1rem;font-weight:600;display:flex;align-items:center;gap:.35rem;}
.vcsnd{background:none;border:none;color:var(--oc);cursor:pointer;font-size:.9rem;padding:0;}
.vcp{font-size:.7rem;color:#a08060;font-family:monospace;}
.vcm{font-size:.82rem;color:#5c3d2e;margin:.2rem 0;}
.vce{font-size:.72rem;color:#a08060;font-style:italic;}
.vcs{font-size:.66rem;color:#c0b0a0;margin-top:.2rem;}
.vcx{position:absolute;top:.45rem;right:.65rem;background:none;border:none;color:#ccc;cursor:pointer;font-size:.9rem;}
.vcx:hover{color:#e74c3c;}
.qcard{background:#fff;border:1px solid #e8dfd0;border-radius:8px;padding:.9rem;}
.qq{font-size:.88rem;margin-bottom:.65rem;}
.qq strong{font-family:"Lora",serif;font-size:1.05rem;color:var(--oc);}
.qopts{display:flex;flex-direction:column;gap:.3rem;}
.qopt{padding:.45rem .7rem;border:1px solid #ddd;border-radius:6px;background:none;text-align:left;font-family:inherit;font-size:.82rem;cursor:pointer;}
.qopt.ok{background:#e8f5e8;border-color:var(--lf);color:var(--lf);}
.qopt.no{background:#fde8e8;border-color:#e74c3c;color:#e74c3c;}
.qnxt{margin-top:.65rem;padding:.4rem .85rem;background:var(--oc);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.8rem;display:none;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#d0c0a8;border-radius:2px;}
</style>
</head>
<body>
<header>
  <div class="logo">🦘 <span>澳洲故事</span> · 英语阅读</div>
  <button class="hbtn" onclick="toggleWB()">📖 生词本 <span class="cnt" id="wbc">0</span></button>
</header>

<!-- HOME: card grid -->
<div id="home">
  <div class="home-intro">
    <h2>20篇澳洲故事</h2>
    <p>点击任意文章开始阅读 · 点击单词查看释义和发音</p>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- READER -->
<div id="reader">
  <div class="reader-header">
    <button class="back-btn" onclick="goHome()">← 返回</button>
    <div class="reader-title-bar">
      <div class="rtag" id="rtag"></div>
      <div class="rtitle" id="rtitle"></div>
    </div>
  </div>
  <div class="article-body" id="article-body"></div>
</div>

<!-- Word popup -->
<div class="pop" id="pop">
  <div class="pw"><span id="pwt"></span><button class="psnd" onclick="speakW()">🔊</button></div>

<!-- Wordbook full-screen panel -->
<div class="wb" id="wb">

    <button class="wbtab active" id="tl" onclick="swTab('list')">单词列表</button>

    <div class="empty">📝 还没有生词<br>阅读时点击单词加入</div>
  </div>
</div>

<script>
var A=[{"id":1,"tag":"history","tn":"历史","title":"The First Fleet","sub":"一个流放地如何成为一个国家","time":"约3分钟","body":["In 1788, eleven ships carrying over 1,400 people arrived at Sydney Harbour. This was the First Fleet — a remarkable voyage that changed a continent forever. Most passengers were not explorers by choice. They were convicts, sentenced to transportation for crimes in Britain.","The British government needed a new place to send prisoners after losing its American colonies. Jails in England were dangerously overcrowded. When explorer James Cook reported on the fertile land around Botany Bay in 1770, officials saw an opportunity.","The journey took eight months and covered 24,000 kilometres. Conditions were harsh. Prisoners were kept below deck with poor ventilation and limited food. Remarkably, only 48 people died during the entire journey.","On 26 January 1788, Captain Phillip raised the British flag and declared the colony established. This date is now Australia Day. For many Aboriginal Australians, it marks the beginning of displacement and suffering — they call it Invasion Day instead."],"vocab":{"convicts":{"zh":"囚犯","ph":"/ˈkɒnvɪkts/","ex":"The convicts were sent from Britain."},"sentenced":{"zh":"被判处刑罚","ph":"/ˈsentənst/","ex":"He was sentenced to seven years."},"overcrowded":{"zh":"过度拥挤","ph":"/ˌoʊvərˈkraʊdɪd/","ex":"The jails were dangerously overcrowded."},"fertile":{"zh":"肥沃的","ph":"/ˈfɜːrtaɪl/","ex":"The fertile land was perfect for farming."},"ventilation":{"zh":"通风","ph":"/ˌventɪˈleɪʃən/","ex":"The room had poor ventilation."},"remarkably":{"zh":"非常地","ph":"/rɪˈmɑːrkəbli/","ex":"Remarkably, only 48 people died."},"displacement":{"zh":"流离失所","ph":"/dɪsˈpleɪsmənt/","ex":"The war caused displacement."},"voyage":{"zh":"航行","ph":"/ˈvɔɪɪdʒ/","ex":"The voyage took eight months."},"colony":{"zh":"殖民地","ph":"/ˈkɒləni/","ex":"Australia was once a British colony."},"established":{"zh":"建立","ph":"/ɪˈstæblɪʃt/","ex":"The colony was officially established."}}},{"id":2,"tag":"nature","tn":"自然","title":"The Great Barrier Reef","sub":"地球上最大的生物结构正面临消失的危机","time":"约3分钟","body":["Stretching over 2,300 kilometres along the northeastern coast of Australia, the Great Barrier Reef is the largest coral reef system on Earth — so large it can be seen from space. It is home to over 1,500 species of fish, 4,000 types of mollusc, and dozens of shark species.","Coral reefs are called the rainforests of the sea because of their incredible biodiversity. Despite covering less than one percent of the ocean floor, they support about 25 percent of all marine species. The reef generates around AUD 6.4 billion for Australia each year.","However, the reef faces a serious threat: climate change. When ocean temperatures rise, coral undergoes bleaching — expelling the colourful algae inside it, turning white and becoming vulnerable to disease. Mass bleaching events hit in 2016, 2017, 2020, and 2022.","Scientists warn that without action to reduce carbon emissions, up to 99 percent of coral reefs worldwide could be severely damaged by 2050. Conservation efforts include water quality programs and replanting coral in damaged areas."],"vocab":{"biodiversity":{"zh":"生物多样性","ph":"/ˌbaɪoʊdaɪˈvɜːrsəti/","ex":"The rainforest has incredible biodiversity."},"bleaching":{"zh":"白化","ph":"/ˈbliːtʃɪŋ/","ex":"Coral bleaching is caused by rising temperatures."},"vulnerable":{"zh":"脆弱的","ph":"/ˈvʌlnərəbəl/","ex":"Young children are vulnerable."},"emissions":{"zh":"排放物","ph":"/ɪˈmɪʃənz/","ex":"Carbon emissions cause climate change."},"conservation":{"zh":"保护","ph":"/ˌkɒnsərˈveɪʃən/","ex":"Conservation efforts have saved many species."},"marine":{"zh":"海洋的","ph":"/məˈriːn/","ex":"Marine life is threatened by pollution."},"threat":{"zh":"威胁","ph":"/θret/","ex":"Climate change is a serious threat."},"severely":{"zh":"严重地","ph":"/sɪˈvɪərli/","ex":"The reef was severely damaged."},"generates":{"zh":"产生","ph":"/ˈdʒenəreɪts/","ex":"The reef generates billions."},"stretching":{"zh":"延伸","ph":"/ˈstretʃɪŋ/","ex":"The reef is stretching along the coast."}}},{"id":3,"tag":"culture","tn":"文化","title":"The Dreamtime","sub":"世界上最古老的连续文化","time":"约3分钟","body":["Aboriginal Australians have lived on the continent for at least 65,000 years — the oldest continuous culture in the world. At the heart of this culture is the Dreamtime, describing both the creation period of the world and an ongoing spiritual dimension of existence.","In Aboriginal belief, the Dreamtime is not just the distant past but a living reality. Ancestral beings — part human, part animal, part spirit — created the land as they moved across it. Their journeys left behind songlines, invisible pathways that Aboriginal people follow during ceremonies.","Each language group has its own Dreamtime stories, passed down through generations using song, dance, storytelling, and art. These stories contain practical knowledge — where to find water in a drought, which plants are safe to eat, how to predict the weather.","Aboriginal dot paintings seen in galleries worldwide were originally created using sand and meant to be temporary. When artists began painting on canvas in the 1970s, it opened a new chapter for sharing these ancient stories with the world."],"vocab":{"continuous":{"zh":"持续的","ph":"/kənˈtɪnjuəs/","ex":"They maintained a continuous tradition."},"spiritual":{"zh":"精神的","ph":"/ˈspɪrɪtʃuəl/","ex":"The ceremony has deep spiritual meaning."},"ancestral":{"zh":"祖先的","ph":"/ænˈsestrəl/","ex":"They returned to their ancestral homeland."},"ceremonies":{"zh":"仪式","ph":"/ˈserɪmoʊniz/","ex":"The elders performed traditional ceremonies."},"temporary":{"zh":"暂时的","ph":"/ˈtempəreri/","ex":"The shelter was meant to be temporary."},"generations":{"zh":"世代","ph":"/ˌdʒenəˈreɪʃənz/","ex":"Stories were passed down through generations."},"existence":{"zh":"存在","ph":"/ɪɡˈzɪstəns/","ex":"The existence of this culture spans millennia."},"practical":{"zh":"实用的","ph":"/ˈpræktɪkəl/","ex":"These stories contain practical knowledge."},"dimension":{"zh":"维度","ph":"/dɪˈmenʃən/","ex":"The story has a spiritual dimension."},"invisible":{"zh":"看不见的","ph":"/ɪnˈvɪzɪbəl/","ex":"The pathways are invisible."}}},{"id":4,"tag":"fun","tn":"趣闻","title":"Why Australians Call Each Other Mate","sub":"一个词如何定义一种文化","time":"约2.5分钟","body":["Spend any time in Australia and you will hear one word constantly: mate. Australians use it to greet friends, address strangers, express sympathy, and even signal mild irritation. A truck driver calls his boss mate. A prime minister uses it too.","The word traces back to Middle Dutch meaning companion. It arrived with convicts and working-class immigrants. For people at the bottom of a rigid social hierarchy, mate expressed equality — we are all in this together.","This spirit became mateship — a cultural value emphasising loyalty, equality, and looking out for one another. Mateship grew prominent during World War I, when ANZAC soldiers formed fierce bonds in the trenches.","Today, mate has spread globally through film and television. Research suggests Australians value informality and egalitarianism more than people in most English-speaking countries. When an Australian calls you mate, you are considered an equal."],"vocab":{"constantly":{"zh":"不断地","ph":"/ˈkɒnstəntli/","ex":"She was constantly checking her phone."},"irritation":{"zh":"恼怒","ph":"/ˌɪrɪˈteɪʃən/","ex":"He showed signs of irritation."},"hierarchy":{"zh":"等级制度","ph":"/ˈhaɪərɑːrki/","ex":"The company has a strict hierarchy."},"prominent":{"zh":"突出的","ph":"/ˈprɒmɪnənt/","ex":"She became a prominent figure."},"fierce":{"zh":"激烈的","ph":"/fɪərs/","ex":"They formed a fierce friendship."},"egalitarianism":{"zh":"平等主义","ph":"/ɪˌɡælɪˈteərɪənɪzəm/","ex":"Australian culture values egalitarianism."},"loyalty":{"zh":"忠诚","ph":"/ˈlɔɪəlti/","ex":"Mateship is about loyalty."},"sympathy":{"zh":"同情心","ph":"/ˈsɪmpəθi/","ex":"He expressed sympathy."},"equality":{"zh":"平等","ph":"/ɪˈkwɒlɪti/","ex":"Mate culture is based on equality."},"companion":{"zh":"同伴","ph":"/kəmˈpænjən/","ex":"A companion travels with you."}}},{"id":5,"tag":"history","tn":"历史","title":"The Gold Rush That Built a Nation","sub":"1851年的黄金热潮如何改变了澳洲","time":"约3分钟","body":["In February 1851, Edward Hargraves found gold near Bathurst, New South Wales. Within months, tens of thousands were rushing to the goldfields. Within a decade, Australia's population had nearly tripled.","Ships from Britain, America, China, and Europe brought fortune-seekers to Australian ports. More than 40,000 Chinese miners worked the Victorian goldfields, leaving a lasting mark through food, architecture, and community life.","Life on the goldfields was tough. Miners lived in tents, working long hours in muddy rivers and deep shafts. Most found very little gold. Disease was common, as was violence and theft. Yet the atmosphere was one of extraordinary excitement.","The gold rush sparked one of Australia's few armed rebellions. In 1854, miners at the Eureka Stockade in Ballarat rose up against the colonial government over unfair licence fees. The Eureka flag, with its white stars on blue, is still waved at labour protests today."],"vocab":{"tripled":{"zh":"增加到三倍","ph":"/ˈtrɪpəld/","ex":"The population nearly tripled."},"rebellions":{"zh":"叛乱","ph":"/rɪˈbeljənz/","ex":"The workers staged a rebellion."},"atmosphere":{"zh":"气氛","ph":"/ˈætməsfɪər/","ex":"There was an atmosphere of excitement."},"fortune":{"zh":"财富","ph":"/ˈfɔːrtʃən/","ex":"Miners came hoping to find their fortune."},"licence":{"zh":"许可证","ph":"/ˈlaɪsəns/","ex":"You need a licence to drive."},"symbol":{"zh":"象征","ph":"/ˈsɪmbəl/","ex":"The flag is a symbol of workers rights."},"transform":{"zh":"改变","ph":"/trænsˈfɔːrm/","ex":"The discovery would transform Australia."},"colonial":{"zh":"殖民的","ph":"/kəˈləʊniəl/","ex":"The colonial government was unpopular."},"protest":{"zh":"抗议","ph":"/ˈprəʊtest/","ex":"Workers held a protest."},"shafts":{"zh":"矿井","ph":"/ʃɑːfts/","ex":"Miners worked in deep shafts."}}},{"id":6,"tag":"culture","tn":"文化","title":"Vegemite: The Spread That Divides the World","sub":"一罐黑色的酱如何成为澳洲认同的象征","time":"约2.5分钟","body":["Few foods divide opinions as sharply as Vegemite. To Australians, it is a beloved staple — salty and comforting on buttered toast. To most foreign tasters, it is bewilderingly bitter. Yet Vegemite has become one of the most recognisable symbols of Australian identity.","Vegemite was created in 1922 in Melbourne. It is made from brewer's yeast — a by-product of beer-making — mixed with salt, vegetables, and B vitamins. The result is a dark brown paste with an extremely concentrated flavour.","During World War Two, Marmite imports stopped, and Vegemite was promoted as a health food. Doctors recommended it for babies and children. By war's end, it had secured a permanent place in Australian kitchens.","Today, approximately 22 million jars are sold in Australia each year. The mistake most foreigners make is spreading it as thickly as jam. In 1981, Men at Work mentioned a Vegemite sandwich in their famous song Down Under."],"vocab":{"staple":{"zh":"主食必需品","ph":"/ˈsteɪpəl/","ex":"Rice is a staple food."},"bewilderingly":{"zh":"令人困惑地","ph":"/bɪˈwɪldərɪŋli/","ex":"The menu was bewilderingly long."},"concentrated":{"zh":"浓缩的","ph":"/ˈkɒnsəntreɪtɪd/","ex":"This is a very concentrated sauce."},"beloved":{"zh":"深受喜爱的","ph":"/bɪˈlʌvɪd/","ex":"Vegemite is a beloved food."},"permanent":{"zh":"永久的","ph":"/ˈpɜːrmənənt/","ex":"It secured a permanent place."},"promoted":{"zh":"被推广","ph":"/prəˈməʊtɪd/","ex":"The product was heavily promoted."},"identity":{"zh":"身份认同","ph":"/aɪˈdentɪti/","ex":"Food is part of national identity."},"bitter":{"zh":"苦的","ph":"/ˈbɪtər/","ex":"The taste is very bitter."},"approximately":{"zh":"大约","ph":"/əˈprɒksɪmətli/","ex":"Approximately 22 million jars are sold."},"secured":{"zh":"确保","ph":"/sɪˈkjʊərd/","ex":"It secured a place in kitchens."}}},{"id":7,"tag":"people","tn":"人物","title":"Ned Kelly: Outlaw or Folk Hero","sub":"澳洲最著名的罪犯也是一面文化镜子","time":"约3分钟","body":["Few figures in Australian history are as controversial or enduringly fascinating as Ned Kelly. To some, he was a murderer who killed three policemen. To others, he was a courageous rebel who stood up against a corrupt government.","Edward Ned Kelly was born around 1854 in Victoria to Irish immigrant parents. By his mid-twenties, he had killed three police officers and gone on the run with his gang, robbing banks for nearly two years.","What made Kelly remarkable was his ability to attract public sympathy. He wrote passionate letters defending his actions and accusing police of systematic harassment of poor Irish families.","Kelly's final stand came in 1880. His gang wore homemade armour made from ploughshares — iron plates that stopped bullets but left their legs exposed. Police shot him in the legs. He was hanged on 11 November 1880, aged 25. His last words: Such is life."],"vocab":{"controversial":{"zh":"有争议的","ph":"/ˌkɒntrəˈvɜːrʃəl/","ex":"The decision was very controversial."},"corrupt":{"zh":"腐败的","ph":"/kəˈrʌpt/","ex":"The corrupt official was removed."},"sympathy":{"zh":"同情心","ph":"/ˈsɪmpəθi/","ex":"He attracted public sympathy."},"armour":{"zh":"盔甲","ph":"/ˈɑːrmər/","ex":"The knight wore heavy armour."},"courageous":{"zh":"勇敢的","ph":"/kəˈreɪdʒəs/","ex":"She was a courageous leader."},"harassment":{"zh":"骚扰","ph":"/ˈhærəsmənt/","ex":"He accused police of harassment."},"rebel":{"zh":"反叛者","ph":"/ˈrebəl/","ex":"Kelly was seen as a rebel."},"passionate":{"zh":"充满激情的","ph":"/ˈpæʃənət/","ex":"He wrote passionate letters."},"enduringly":{"zh":"持久地","ph":"/ɪnˈdjʊərɪŋli/","ex":"He is enduringly fascinating."},"systematic":{"zh":"系统性的","ph":"/ˌsɪstəˈmætɪk/","ex":"There was systematic harassment."}}},{"id":8,"tag":"fun","tn":"趣闻","title":"Why Australia Has So Many Dangerous Animals","sub":"这个国家80%的动物在其他地方找不到","time":"约2.5分钟","body":["Australia is home to some of the world's most venomous snakes, spiders, and jellyfish. The answer to why lies in extraordinary geological isolation. Australia separated from the supercontinent of Gondwana around 50 million years ago.","Cut off from the rest of the world, animals evolved in unique directions. Without large predators like lions or bears, smaller, specialised, and sometimes highly toxic animals thrived.","Despite its fearsome reputation, Australia's wildlife very rarely kills people. Fewer than five people die from snake bites each year. Ironically, the most dangerous animal in Australia is the horse — falling from horses causes more deaths than any native wildlife.","The real danger is the environment itself. Heat, drought, and bushfires are far more lethal than any animal. The outback can reach temperatures over 50 degrees Celsius. Tourists underestimating conditions get lost or die of dehydration every year."],"vocab":{"venomous":{"zh":"有毒的","ph":"/ˈvenəməs/","ex":"The venomous snake should not be handled."},"isolation":{"zh":"隔离孤立","ph":"/ˌaɪsəˈleɪʃən/","ex":"The island's isolation led to unique wildlife."},"predators":{"zh":"捕食者","ph":"/ˈpredətərz/","ex":"Lions are apex predators."},"thrived":{"zh":"繁荣","ph":"/θraɪvd/","ex":"The business thrived."},"ironically":{"zh":"讽刺地","ph":"/aɪˈrɒnɪkli/","ex":"Ironically, the safest path was the most dangerous."},"dehydration":{"zh":"脱水","ph":"/ˌdiːhaɪˈdreɪʃən/","ex":"Hikers must carry water to avoid dehydration."},"lethal":{"zh":"致命的","ph":"/ˈliːθəl/","ex":"The heat can be lethal."},"geological":{"zh":"地质的","ph":"/ˌdʒiːəˈlɒdʒɪkəl/","ex":"Australia has a unique geological history."},"reputation":{"zh":"名声","ph":"/ˌrepjʊˈteɪʃən/","ex":"Australia has a fearsome reputation."},"fearsome":{"zh":"令人恐惧的","ph":"/ˈfɪərsəm/","ex":"It has a fearsome reputation."}}},{"id":9,"tag":"culture","tn":"文化","title":"The Flat White: Australia's Gift to Coffee","sub":"悉尼和墨尔本至今还在争谁发明了它","time":"约2.5分钟","body":["In the global coffee world, Australia occupies a unique position. While Italy established espresso culture and the United States popularised large sweet drinks, Australia created something different — a sophisticated coffee culture built around quality and the flat white.","The flat white is a small but powerful drink: a double espresso shot with velvety steamed milk. Unlike a latte, it is concentrated and intense. A skilled barista can draw beautiful latte art patterns on the surface.","The precise origin is disputed. Both Sydney and Melbourne claim to have invented it in the 1980s. New Zealand also claims credit. Australia and New Zealand developed the drink independently of European or American traditions.","Australian coffee culture was shaped by post-war Italian and Greek immigrants in the 1950s. Today, Australian baristas have spread their exacting standards internationally. The flat white now appears on Starbucks menus worldwide."],"vocab":{"sophisticated":{"zh":"精致的","ph":"/səˈfɪstɪkeɪtɪd/","ex":"She has very sophisticated taste."},"velvety":{"zh":"丝滑的","ph":"/ˈvelvɪti/","ex":"The sauce had a velvety texture."},"disputed":{"zh":"有争议的","ph":"/dɪˈspjuːtɪd/","ex":"The ownership remains disputed."},"exacting":{"zh":"严格的","ph":"/ɪɡˈzæktɪŋ/","ex":"The job requires exacting attention."},"precise":{"zh":"精确的","ph":"/prɪˈsaɪs/","ex":"The precise origin is unknown."},"occupies":{"zh":"占据","ph":"/ˈɒkjʊpaɪz/","ex":"Australia occupies a unique position."},"established":{"zh":"建立","ph":"/ɪˈstæblɪʃt/","ex":"Italy established the espresso tradition."},"influential":{"zh":"有影响力的","ph":"/ˌɪnfluˈenʃəl/","ex":"Australia is influential in coffee culture."},"barista":{"zh":"咖啡师","ph":"/bəˈriːstə/","ex":"A skilled barista can make latte art."},"craft":{"zh":"工艺","ph":"/krɑːft/","ex":"Coffee making is a craft."}}},{"id":10,"tag":"history","tn":"历史","title":"The Snowy Mountains Scheme","sub":"二战后改变澳洲面貌的惊人工程","time":"约3分钟","body":["Between 1949 and 1974, Australia undertook one of the most ambitious engineering projects in the southern hemisphere — the Snowy Mountains Scheme. It involved diverting rivers, building 16 dams, 7 power stations, and 225 kilometres of tunnels through the Australian Alps.","The scheme was born from post-war necessity. Australia's population was growing, industries needed electricity, and dry inland regions needed water. Prime Minister Ben Chifley called it a monument to the Australian people.","More than 100,000 workers participated — most were migrants from war-torn Europe: Italians, Germans, Poles, and Ukrainians. Conditions were brutal. Workers lived in remote mountain camps. More than 120 workers died during construction.","Despite the hardships, the project created something more than infrastructure. Workers from countries that had been at war found themselves working side by side, sharing meals and languages. Many settled permanently in Australia, adding to the country's multicultural fabric."],"vocab":{"ambitious":{"zh":"雄心勃勃的","ph":"/æmˈbɪʃəs/","ex":"It was the most ambitious project."},"diverting":{"zh":"转移","ph":"/daɪˈvɜːrtɪŋ/","ex":"Engineers considered diverting the river."},"irrigation":{"zh":"灌溉","ph":"/ˌɪrɪˈɡeɪʃən/","ex":"Irrigation transformed the desert."},"monument":{"zh":"纪念碑","ph":"/ˈmɒnjʊmənt/","ex":"The building stands as a monument."},"migrants":{"zh":"移民","ph":"/ˈmaɪɡrənts/","ex":"Millions of migrants arrived in Australia."},"infrastructure":{"zh":"基础设施","ph":"/ˈɪnfrəstrʌktʃər/","ex":"The country needs infrastructure."},"multicultural":{"zh":"多元文化的","ph":"/ˌmʌltiˈkʌltʃərəl/","ex":"Australia is a multicultural society."},"determination":{"zh":"决心","ph":"/dɪˌtɜːrmɪˈneɪʃən/","ex":"She showed great determination."},"permanent":{"zh":"永久的","ph":"/ˈpɜːrmənənt/","ex":"Many settled permanently."},"brutal":{"zh":"残酷的","ph":"/ˈbruːtəl/","ex":"The conditions were brutal."}}},{"id":11,"tag":"fun","tn":"趣闻","title":"Australian Slang: A Survival Guide","sub":"为什么arvo是下午，brekkie是早餐","time":"约2.5分钟","body":["Australians shorten words and add o or ie to almost everything. Afternoon becomes arvo, breakfast becomes brekkie, sunglasses become sunnies, and a petrol station becomes a servo. This is not just for convenience — it is a form of cultural identity.","Beyond shortening, Australians invented colourful expressions. Flat out like a lizard drinking means extremely busy. She will be right means everything will be fine. If someone calls you a larrikin, it is a compliment — a cheerful, mischievous, free-spirited person.","Some slang has darker histories. Many old terms for Aboriginal Australians are now considered offensive and have been retired from polite conversation. Language reflects changing values over time.","Australian slang continues to evolve through youth culture, sport, and social media. The spirit behind the language — egalitarian, humorous, suspicious of pretension — remains constant. When an Australian says no dramas, you are hearing a philosophy, not just words."],"vocab":{"colourful":{"zh":"生动的","ph":"/ˈkʌlərfəl/","ex":"He used colourful language."},"mischievous":{"zh":"淘气的","ph":"/ˈmɪstʃɪvəs/","ex":"The mischievous child hid."},"pretension":{"zh":"自命不凡","ph":"/prɪˈtenʃən/","ex":"He spoke without pretension."},"evolve":{"zh":"演变","ph":"/ɪˈvɒlv/","ex":"Language continues to evolve."},"larrikin":{"zh":"率性自由的人","ph":"/ˈlærɪkɪn/","ex":"He was a classic larrikin."},"offensive":{"zh":"冒犯性的","ph":"/əˈfensɪv/","ex":"The comment was considered offensive."},"egalitarian":{"zh":"平等主义的","ph":"/ɪˌɡælɪˈteərɪən/","ex":"Australian culture has an egalitarian spirit."},"convenience":{"zh":"方便","ph":"/kənˈviːniəns/","ex":"This is done for convenience."},"humorous":{"zh":"幽默的","ph":"/ˈhjuːmərəs/","ex":"He was known for his humorous personality."},"identity":{"zh":"认同","ph":"/aɪˈdentɪti/","ex":"Language is a form of cultural identity."}}},{"id":12,"tag":"history","tn":"历史","title":"ANZAC Day: When Defeat Became Identity","sub":"为何澳洲人用一场惨败来定义自己","time":"约3分钟","body":["Every year on 25 April, Australians pause to remember a military defeat. ANZAC Day commemorates the landing of Australian and New Zealand troops at Gallipoli, Turkey, in 1915 — a campaign that ended in failure after eight months of brutal fighting.","The ANZACs landed on 25 April 1915 and encountered steep cliffs, fierce resistance, and terrain completely unsuited for the attack. By the time the evacuation came in December 1915, over 8,000 Australians had died.","War correspondents sent back stories of extraordinary courage and loyalty. These soldiers faced death with dry humour and always looked after their mates. They seemed to embody values Australians already prized — equality, resilience, and anti-authoritarian spirit.","Today, ANZAC Day is observed with dawn services across Australia. Thousands gather before sunrise, standing in silence as the Last Post bugle call plays. It is perhaps the most genuinely emotional public event in Australia's calendar."],"vocab":{"commemorates":{"zh":"纪念","ph":"/kəˈmemərɪts/","ex":"The ceremony commemorates those who died."},"evacuation":{"zh":"撤离","ph":"/ɪˌvækjuˈeɪʃən/","ex":"The evacuation took several days."},"resilience":{"zh":"韧性","ph":"/rɪˈzɪlɪəns/","ex":"The community showed great resilience."},"embody":{"zh":"体现","ph":"/ɪmˈbɒdi/","ex":"She embodies the spirit of the team."},"defeat":{"zh":"失败","ph":"/dɪˈfiːt/","ex":"They built their identity around a defeat."},"gratitude":{"zh":"感激","ph":"/ˈɡrætɪtjuːd/","ex":"People attend to show their gratitude."},"troops":{"zh":"军队","ph":"/truːps/","ex":"Troops landed on the beach at dawn."},"brutal":{"zh":"残酷的","ph":"/ˈbruːtəl/","ex":"The fighting was brutal."},"encounter":{"zh":"遭遇","ph":"/ɪnˈkaʊntər/","ex":"They encountered fierce resistance."},"sacred":{"zh":"神圣的","ph":"/ˈseɪkrɪd/","ex":"ANZAC Day is a sacred occasion."}}},{"id":13,"tag":"nature","tn":"自然","title":"The Outback: Life at the Edge of Endurance","sub":"占澳洲70%面积的内陆，却只有1%的人口","time":"约3分钟","body":["Australia's outback — the vast, arid interior — covers roughly 70 percent of the country but is home to less than one percent of its population. It is one of the most inhospitable environments on Earth, yet it has been inhabited for tens of thousands of years.","The most iconic feature is Uluru in the Northern Territory — a massive sandstone monolith rising 348 metres above the flat plain. For the Anangu people, its traditional custodians, Uluru is sacred, predating European contact by at least 10,000 years.","Life in the outback requires extraordinary adaptation. Temperatures regularly exceed 45 degrees Celsius in summer. Rain may not fall for years. The Royal Flying Doctor Service provides medical care across remote areas.","Tourists are regularly warned about underestimating the environment. People die every year from heat exposure or getting lost without enough water. The outback is ancient, vast, and indifferent — it demands respect from everyone who enters it."],"vocab":{"arid":{"zh":"干旱的","ph":"/ˈærɪd/","ex":"The arid landscape stretched for hundreds of kilometres."},"inhospitable":{"zh":"不宜居住的","ph":"/ɪnˈhɒspɪtəbəl/","ex":"The climate was inhospitable."},"monolith":{"zh":"独石","ph":"/ˈmɒnəlɪθ/","ex":"Uluru is a massive sandstone monolith."},"custodians":{"zh":"守护者","ph":"/kʌˈstəʊdiənz/","ex":"The Anangu are traditional custodians."},"adaptation":{"zh":"适应","ph":"/ˌædæpˈteɪʃən/","ex":"Survival requires remarkable adaptation."},"exceed":{"zh":"超过","ph":"/ɪkˈsiːd/","ex":"Temperatures regularly exceed 40 degrees."},"remote":{"zh":"偏远的","ph":"/rɪˈməʊt/","ex":"They lived in a very remote area."},"inhabited":{"zh":"有人居住的","ph":"/ɪnˈhæbɪtɪd/","ex":"The land has been inhabited for thousands of years."},"iconic":{"zh":"标志性的","ph":"/aɪˈkɒnɪk/","ex":"Uluru is an iconic landmark."},"vast":{"zh":"广阔的","ph":"/vɑːst/","ex":"The outback is a vast landscape."}}},{"id":14,"tag":"culture","tn":"文化","title":"Australian Rules Football","sub":"1858年诞生的运动如何成为民族的共同语言","time":"约3分钟","body":["In southern Australia, there is one sport that transcends all others: Australian Rules Football, known as footy. It is not rugby, not soccer, not American football. It is uniquely Australian, inspiring a level of passion that borders on religious devotion.","Created in Melbourne in 1858, the game uses an oval ball on a large oval ground. Players can run with the ball if they bounce it or kick it to teammates. The most spectacular skill is the mark — catching a high-kicked ball cleanly in the air.","The AFL grand final, held every September at the Melbourne Cricket Ground, attracts over 100,000 spectators — the largest crowd for any club sport event in the Southern Hemisphere.","For many Australians, the footy team they support is inherited like a family name. It is a tribal identity and a shared language. After a big win, Monday conversations at work are effortless. After a big loss, they are difficult."],"vocab":{"transcends":{"zh":"超越","ph":"/trænˈsendz/","ex":"Great art transcends cultural boundaries."},"devotion":{"zh":"热爱","ph":"/dɪˈvəʊʃən/","ex":"His devotion to the team was absolute."},"spectacular":{"zh":"壮观的","ph":"/spekˈtækjʊlər/","ex":"He took a spectacular catch."},"spectators":{"zh":"观众","ph":"/spekˈteɪtərz/","ex":"Over 100,000 spectators attended."},"inherited":{"zh":"继承的","ph":"/ɪnˈherɪtɪd/","ex":"His love of football was inherited."},"tribal":{"zh":"部落的","ph":"/ˈtraɪbəl/","ex":"Supporting a team creates a tribal identity."},"effortless":{"zh":"毫不费力的","ph":"/ˈefətləs/","ex":"The conversation was effortless."},"oval":{"zh":"椭圆形的","ph":"/ˈəʊvəl/","ex":"The ball has an oval shape."},"passion":{"zh":"激情","ph":"/ˈpæʃən/","ex":"Australians have great passion for football."},"unique":{"zh":"独特的","ph":"/juːˈniːk/","ex":"Australian Rules Football is unique."}}},{"id":15,"tag":"people","tn":"人物","title":"The Women Who Shaped Modern Australia","sub":"从选举权到总理，澳洲女性走过的百年之路","time":"约3分钟","body":["Australia has a complex history on women's rights. South Australia granted women voting rights in 1894 — among the first in the world. But pay discrimination and limited career opportunities held women back for much of the 20th century.","Julia Gillard became Australia's first female Prime Minister in 2010. Despite significant achievements including education reforms, she faced relentless personal attacks. In 2012, her parliamentary speech calling out misogyny went viral globally.","Germaine Greer, born in Melbourne, wrote The Female Eunuch in 1970 — one of the most influential feminist texts of the century. Cathy Freeman lit the Olympic flame at Sydney 2000 before winning gold in the 400 metres.","Today, Australia ranks in the global top 20 for gender equality, but significant gaps remain. Women earn less than men on average and are underrepresented in corporate leadership."],"vocab":{"discrimination":{"zh":"歧视","ph":"/dɪˌskrɪmɪˈneɪʃən/","ex":"Pay discrimination affects many workers."},"relentless":{"zh":"不间断的","ph":"/rɪˈlentləs/","ex":"She faced relentless criticism."},"misogyny":{"zh":"厌女症","ph":"/mɪˈsɒdʒɪni/","ex":"Her speech called out misogyny."},"influential":{"zh":"有影响力的","ph":"/ˌɪnfluˈenʃəl/","ex":"The book was incredibly influential."},"symbolic":{"zh":"象征性的","ph":"/sɪmˈbɒlɪk/","ex":"Her victory had great symbolic meaning."},"pioneering":{"zh":"开拓性的","ph":"/ˌpaɪəˈnɪərɪŋ/","ex":"She had a pioneering role in politics."},"underrepresented":{"zh":"代表性不足","ph":"/ˌʌndəˌreprɪˈzentɪd/","ex":"Women are underrepresented in leadership."},"grant":{"zh":"授予","ph":"/ɡrɑːnt/","ex":"They were granted the right to vote."},"viral":{"zh":"病毒式传播的","ph":"/ˈvaɪrəl/","ex":"The speech went viral."},"parliamentary":{"zh":"议会的","ph":"/ˌpɑːrləˈmentəri/","ex":"She gave a parliamentary speech."}}},{"id":16,"tag":"fun","tn":"趣闻","title":"Cricket, Bodyline, and Sledging","sub":"一场板球系列赛如何几乎引发了外交危机","time":"约3分钟","body":["Cricket holds a special place in Australian culture — the summer sport of lazy afternoons and family barbecues. But Australian cricket has also produced some of the most dramatic and controversial episodes in sporting history.","The most famous is the Bodyline series of 1932 to 1933. England's captain devised a bowling strategy to neutralise Australia's greatest batsman, Don Bradman, by deliberately aiming the ball at the batsman's body. The tactic was legal but widely considered unsportsmanlike.","Australia's cricket board sent telegrams calling the tactics unsportsmanlike. The British establishment responded with outrage — not at the tactic, but at the suggestion that English conduct could be questioned.","Australian cricket is also famous for sledging — making verbal comments to distract or unsettle opponents. Some is harmless humour, some crosses into abuse. It captures the competitive intensity of the Australia-England rivalry known as The Ashes."],"vocab":{"controversial":{"zh":"有争议的","ph":"/ˌkɒntrəˈvɜːrʃəl/","ex":"The decision was very controversial."},"neutralise":{"zh":"使无效","ph":"/ˈnjuːtrəlaɪz/","ex":"The tactic was designed to neutralise the opponent."},"unsportsmanlike":{"zh":"不道德的","ph":"/ʌnˈspɔːrtsmənlaɪk/","ex":"The tactics were considered unsportsmanlike."},"diplomatic":{"zh":"外交的","ph":"/ˌdɪpləˈmætɪk/","ex":"The incident nearly caused a diplomatic crisis."},"sledging":{"zh":"语言干扰","ph":"/ˈsledʒɪŋ/","ex":"Sledging is a controversial part of cricket."},"devised":{"zh":"设计","ph":"/dɪˈvaɪzd/","ex":"The coach devised a clever strategy."},"outrage":{"zh":"愤慨","ph":"/ˈaʊtreɪdʒ/","ex":"The decision caused public outrage."},"intensity":{"zh":"强度","ph":"/ɪnˈtensɪti/","ex":"The rivalry is known for its intensity."},"deliberately":{"zh":"故意地","ph":"/dɪˈlɪbərətli/","ex":"He deliberately aimed at the batsman."},"establish":{"zh":"建立","ph":"/ɪˈstæblɪʃ/","ex":"They established a new record."}}},{"id":17,"tag":"history","tn":"历史","title":"The White Australia Policy","sub":"一个官方政策如何试图决定谁是澳洲人","time":"约3分钟","body":["For much of the 20th century, Australia operated an official immigration policy that restricted entry based on race. Known as the White Australia Policy, it shaped the country's demographics for over 70 years.","The policy began in 1901 with a dictation test — arriving migrants could be required to write a passage in any European language chosen by the official. If officials wanted to exclude someone, they simply chose a language the person did not know.","The policy reflected widespread racial theories and fears of economic competition from Asian immigrants. Aboriginal Australians were not counted in the census at all, and were subjected to policies including the forced removal of children from their families.","Race was formally removed as a criterion for immigration in the early 1970s. Today, about 30 percent of Australians were born overseas. The White Australia Policy is now universally condemned, but its legacy continues to shape conversations about race and belonging."],"vocab":{"demographics":{"zh":"人口统计","ph":"/ˌdeməˈɡræfɪks/","ex":"The policy changed Australia's demographics."},"multiculturalism":{"zh":"多元文化主义","ph":"/ˌmʌltiˈkʌltʃərəlɪzəm/","ex":"Multiculturalism is now core to Australian identity."},"discriminatory":{"zh":"歧视性的","ph":"/dɪˈskrɪmɪnətəri/","ex":"The test was discriminatory by design."},"criterion":{"zh":"标准","ph":"/kraɪˈtɪərɪən/","ex":"Race was removed as a criterion."},"condemned":{"zh":"谴责","ph":"/kənˈdemd/","ex":"The policy is now universally condemned."},"legacy":{"zh":"遗产影响","ph":"/ˈleɡəsi/","ex":"The legacy of the policy is still felt today."},"restrict":{"zh":"限制","ph":"/rɪˈstrɪkt/","ex":"The policy sought to restrict immigration."},"widespread":{"zh":"广泛的","ph":"/ˈwaɪdspred/","ex":"There was widespread support for the change."},"belonging":{"zh":"归属感","ph":"/bɪˈlɒŋɪŋ/","ex":"A sense of belonging is important."},"subjected":{"zh":"使遭受","ph":"/səbˈdʒektɪd/","ex":"They were subjected to unfair treatment."}}},{"id":18,"tag":"nature","tn":"自然","title":"Kangaroos: The Animal That Defines a Nation","sub":"为什么澳洲把一种不能倒退的动物放在国徽上","time":"约2.5分钟","body":["Australia's coat of arms features the emu and the kangaroo. Both were chosen partly because neither can easily walk backwards — suggesting a nation always moving forward. The kangaroo has become Australia's most recognisable animal symbol.","Kangaroos are marsupials — mammals that carry young in a pouch. The Red Kangaroo is the largest, with males reaching over 1.8 metres. They are among the most efficient movers in the animal kingdom — at high speeds, hopping costs less energy the faster they go.","Australia has more kangaroos than people. Current estimates suggest around 50 million live in the wild. For farmers, they compete with livestock for grass and water. Australia operates a commercial kangaroo industry under strict government quotas.","The idea of eating kangaroo is culturally sensitive. Many Australians see it as a national symbol and feel uncomfortable consuming kangaroo, even though the meat is lean, sustainable, and high in protein."],"vocab":{"marsupials":{"zh":"有袋动物","ph":"/mɑːrˈsuːpɪəlz/","ex":"Kangaroos are the most well-known marsupials."},"pouch":{"zh":"育儿袋","ph":"/paʊtʃ/","ex":"The baby joey lives in its mother's pouch."},"efficient":{"zh":"高效的","ph":"/ɪˈfɪʃənt/","ex":"Kangaroos are very efficient at moving."},"livestock":{"zh":"牲畜","ph":"/ˈlaɪvstɒk/","ex":"The drought affected both livestock and crops."},"quota":{"zh":"配额","ph":"/ˈkwəʊtə/","ex":"Hunting is controlled by a strict quota."},"sustainable":{"zh":"可持续的","ph":"/səˈsteɪnəbəl/","ex":"Kangaroo farming is relatively sustainable."},"sensitive":{"zh":"敏感的","ph":"/ˈsensɪtɪv/","ex":"This is a culturally sensitive topic."},"symbol":{"zh":"象征","ph":"/ˈsɪmbəl/","ex":"The kangaroo is a symbol of Australia."},"consuming":{"zh":"食用","ph":"/kənˈsjuːmɪŋ/","ex":"Many feel uncomfortable consuming kangaroo."},"recognisable":{"zh":"可辨认的","ph":"/ˈrekəɡnaɪzəbəl/","ex":"It is instantly recognisable worldwide."}}},{"id":19,"tag":"culture","tn":"文化","title":"Sydney vs Melbourne: The Eternal Rivalry","sub":"两座城市，一个国家，无数争不完的话题","time":"约2.5分钟","body":["Ask an Australian from Sydney what they think of Melbourne, and you will hear a comment about the weather. Ask a Melburnian about Sydney, and you will hear it is all style and no substance. The rivalry between Australia's two largest cities is one of its most enduring cultural traditions.","The rivalry has deep historical roots. When the colonies federated in 1901, fierce debate erupted about where to place the capital. Neither city would accept the other being chosen, so they built a new capital — Canberra — halfway between them.","Sydney has the Opera House, the Harbour Bridge, and Bondi Beach. Melbourne has laneways full of street art, world-class cafe culture, and better live music. Sydney values outdoor lifestyle; Melbourne values intellectual life, art, and food.","In truth, both cities benefit from the competition — it keeps each striving to be more interesting and more vibrant. International visitors are often surprised to find two very different cities despite both being Australian."],"vocab":{"rivalry":{"zh":"竞争对抗","ph":"/ˈraɪvəlri/","ex":"There is a friendly rivalry between the two cities."},"enduring":{"zh":"持久的","ph":"/ɪnˈdjʊərɪŋ/","ex":"It is an enduring cultural tradition."},"federated":{"zh":"联合成联邦","ph":"/ˈfedəreɪtɪd/","ex":"The colonies federated in 1901."},"vibrant":{"zh":"充满活力的","ph":"/ˈvaɪbrənt/","ex":"The city has a vibrant arts scene."},"substance":{"zh":"实质","ph":"/ˈsʌbstəns/","ex":"He said Sydney was all style and no substance."},"intellectual":{"zh":"知识分子的","ph":"/ˌɪntəˈlektʃuəl/","ex":"Melbourne values intellectual life."},"civic":{"zh":"城市的","ph":"/ˈsɪvɪk/","ex":"Civic pride is important to both cities."},"striving":{"zh":"努力","ph":"/ˈstraɪvɪŋ/","ex":"Both cities are striving to be the best."},"erupted":{"zh":"爆发","ph":"/ɪˈrʌptɪd/","ex":"Fierce debate erupted."},"debate":{"zh":"争论","ph":"/dɪˈbeɪt/","ex":"There was fierce debate about the capital."}}},{"id":20,"tag":"people","tn":"人物","title":"The Stolen Generations","sub":"一段历史，一个道歉，以及尚未弥合的伤痛","time":"约3分钟","body":["Between approximately 1910 and 1970, the Australian government systematically removed Aboriginal children from their families. These children were placed with white families or in institutions, expected to assimilate and lose their cultural identities. They are known as the Stolen Generations.","The policy was driven by a theory of assimilation — the belief that Aboriginal people could be absorbed into white society if children were separated from their communities early enough. Officials believed they were helping. They were not.","The effects are multigenerational. The Stolen Generations have significantly higher rates of mental illness, substance abuse, and early death. Studies show that trauma is transmitted through families across generations.","On 13 February 2008, Prime Minister Kevin Rudd formally apologised to Aboriginal Australians in parliament. Crowds watched live, many weeping. For Aboriginal elders who had waited their whole lives to hear those words, it was a profound moment. But an apology is not repair — the gaps remain significant today."],"vocab":{"systematically":{"zh":"有系统地","ph":"/ˌsɪstəˈmætɪkli/","ex":"Children were systematically removed."},"assimilate":{"zh":"同化","ph":"/əˈsɪmɪleɪt/","ex":"Policies tried to force them to assimilate."},"multigenerational":{"zh":"跨代的","ph":"/ˌmʌltiˌdʒenəˈreɪʃənl/","ex":"The trauma is multigenerational."},"transmitted":{"zh":"传递","ph":"/trænsˈmɪtɪd/","ex":"Trauma can be transmitted across generations."},"apology":{"zh":"道歉","ph":"/əˈpɒlədʒi/","ex":"The Prime Minister delivered a formal apology."},"indigenous":{"zh":"土著的","ph":"/ɪnˈdɪdʒɪnəs/","ex":"Indigenous communities face ongoing challenges."},"profound":{"zh":"深刻的","ph":"/prəˈfaʊnd/","ex":"It was a profound moment."},"absorbed":{"zh":"吸收","ph":"/əbˈzɔːbd/","ex":"They were absorbed into mainstream society."},"reckoning":{"zh":"清算反思","ph":"/ˈrekənɪŋ/","ex":"Australia's reckoning with this history is unfinished."},"obligation":{"zh":"义务","ph":"/ˌɒblɪˈɡeɪʃən/","ex":"The government has a moral obligation."}}}];
var TAG_BG={history:"#c4783a",culture:"#5a8a4a",nature:"#2980b9",people:"#8e44ad",fun:"#e67e22"};
var cur=null,wb=[],curW=null,wbTab='list',qIdx=0;

// Build card grid
(function(){
  var g=document.getElementById('grid');
  A.forEach(function(a,i){
    var c=document.createElement('div');
    c.className='card';
    c.innerHTML='<div class="card-num">#'+pad(a.id)+'</div>'
      +'<span class="card-tag" style="background:'+TAG_BG[a.tag]+'">'+a.tn+'</span>'
      +'<div class="card-title">'+xe(a.title)+'</div>'
      +'<div class="card-sub">'+xe(a.sub)+'</div>'
      +'<div class="card-time">'+a.time+'</div>';
    c.onclick=function(){openA(i);};
    g.appendChild(c);
  });
})();

document.addEventListener('click',function(e){
  var p=document.getElementById('pop');
  if(p.style.display!=='none'&&!p.contains(e.target)&&!e.target.classList.contains('w'))
    p.style.display='none';
});

function pad(n){return String(n).padStart(2,'0');}
function xe(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function goHome(){
  document.getElementById('reader').style.display='none';
  document.getElementById('home').style.display='block';
  window.scrollTo(0,0);
}

function openA(idx){
  var a=A[idx];cur=a;
  document.getElementById('home').style.display='none';
  document.getElementById('reader').style.display='block';
  document.getElementById('rtag').textContent=a.tn;
  document.getElementById('rtitle').textContent=a.title;
  var ab=document.getElementById('article-body');
  ab.innerHTML='<h1 class="art-title">'+xe(a.title)+'</h1>'
    +'<p class="art-sub">'+xe(a.sub)+'</p>'
    +'<div class="art-meta">'+a.time+' &nbsp;·&nbsp; 点击单词查看释义和发音</div>'
    +'<div class="abody" id="abody"></div>'
    +'<div class="abar">'
    +'<button class="abtn" id="tbtn" onclick="loadTrans(this)">🔽 中文翻译</button>'
    +'<button class="abtn" id="spkbtn" onclick="speakAll('+idx+',this)">🎧 朗读全文</button>'
    +'</div>'
    +'<div class="tsec" id="tsec"></div>'
    +'<div class="art-nav">'
    +'<button class="nav-btn"'+(idx===0?' disabled':'')+' onclick="openA('+(idx-1)+')">← 上一篇</button>'
    +'<span style="font-size:.75rem;color:#a08060">'+(idx+1)+' / '+A.length+'</span>'
    +'<button class="nav-btn"'+(idx===A.length-1?' disabled':'')+' onclick="openA('+(idx+1)+')">下一篇 →</button>'
    +'</div>';
  var body=document.getElementById('abody');
  a.body.forEach(function(para){
    var p=document.createElement('p');
    para.split(/(\s+)/).forEach(function(tok){
      if(/^\s+$/.test(tok)){p.appendChild(document.createTextNode(tok));return;}
      var cl=tok.replace(/[^a-zA-Z\'\-]/g,'').toLowerCase();
      var sp=document.createElement('span');
      sp.className='w';sp.textContent=tok;sp.dataset.cl=cl;
      if(wb.some(function(w){return w.word===cl;}))sp.classList.add('sv');
      sp.addEventListener('click',function(e){e.stopPropagation();showPop(e,cl,tok,a);});
      p.appendChild(sp);
    });
    body.appendChild(p);
  });
  window.scrollTo(0,0);
}

function showPop(e,cl,orig,a){
  if(!cl||cl.length<2)return;
  curW={cl:cl,orig:orig,a:a};
  var base=cl.replace(/s$|ed$|ing$|ly$|\'s$/,'');
  var info=a.vocab[cl]||a.vocab[base]||null;
  document.getElementById('pwt').textContent=orig.replace(/[^a-zA-Z\'\-]/g,'');
  document.getElementById('pp').textContent=info?info.ph:'';
  document.getElementById('pm').textContent=info?info.zh:'（点击加入生词本）';
  document.getElementById('pe').textContent=info?info.ex:'';
  var inB=wb.some(function(w){return w.word===cl;});
  var ab=document.getElementById('padd');
  ab.textContent=inB?'✓ 已收录':'＋ 生词本';
  ab.className='pb '+(inB?'svd':'add');
  var pop=document.getElementById('pop');
  var r=e.target.getBoundingClientRect();
  var pw=270;
  var x=r.left+window.scrollX;
  var y=r.bottom+window.scrollY+6;
  if(r.left+pw>window.innerWidth-8) x=window.scrollX+window.innerWidth-pw-8;
  if(r.bottom+170>window.innerHeight) y=r.top+window.scrollY-170;
  pop.style.left=Math.max(8,x)+'px';
  pop.style.top=Math.max(60,y)+'px';
  pop.style.display='block';
}

function speakW(){
  var w=document.getElementById('pwt').textContent;
  if(!w||!window.speechSynthesis)return;
  var u=new SpeechSynthesisUtterance(w);
  u.lang='en-AU';u.rate=0.85;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

function addWB(){
  if(!curW)return;
  var cl=curW.cl,orig=curW.orig,a=curW.a;
  var base=cl.replace(/s$|ed$|ing$|ly$|'s$/,'');
  var info=a.vocab[cl]||a.vocab[base]||{zh:'（已记录）',ph:'',ex:'来自：'+a.title};
  if(!wb.some(function(w){return w.word===cl;})){
    wb.push({word:cl,display:orig.replace(/[^a-zA-Z'\-]/g,''),zh:info.zh,ph:info.ph,ex:info.ex,src:a.title});
    document.querySelectorAll('.w[data-cl="'+cl+'"]').forEach(function(el){el.classList.add('sv');});
    document.getElementById('wbc').textContent=wb.length;
    renderWB();
  }
  document.getElementById('padd').textContent='✓ 已收录';
  document.getElementById('padd').className='pb svd';
}

function markW(){
  if(!curW)return;
  document.querySelectorAll('.w[data-cl="'+curW.cl+'"]').forEach(function(el){el.classList.toggle('mk');});
  document.getElementById('pop').style.display='none';
}

async function loadTrans(btn){
  var sec=document.getElementById('tsec');
  if(sec.classList.contains('show')){sec.classList.remove('show');btn.textContent='🔽 中文翻译';return;}
  if(sec.children.length>0){sec.classList.add('show');btn.textContent='🔼 收起翻译';return;}
  btn.textContent='⏳ 翻译中...';btn.disabled=true;
  var paras=Array.from(document.querySelectorAll('#abody p')).map(function(p){return p.innerText;}).join('\n\n');
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:'将以下英文段落翻译成简体中文，保持段落结构，每段用空行分隔，只输出翻译结果。',
        messages:[{role:'user',content:paras}]})
    });
    var data=await res.json();
    var text=(data.content&&data.content[0]&&data.content[0].text)||'翻译失败，请重试。';
    text.split('\n\n').filter(function(s){return s.trim();}).forEach(function(p){
      var d=document.createElement('p');d.className='tp';d.textContent=p.trim();sec.appendChild(d);
    });
    sec.classList.add('show');btn.textContent='🔼 收起翻译';
  }catch(e){
    sec.innerHTML='<p class="tp" style="color:#c0392b">🚫 翻译失败，请检查网络</p>';
    sec.classList.add('show');btn.textContent='🔼 收起';
  }
  btn.disabled=false;
}

function speakAll(idx,btn){
  if(!window.speechSynthesis){alert('您的浏览器不支持语音合成');return;}
  if(btn.dataset.playing==='1'){
    speechSynthesis.cancel();btn.textContent='🎧 朗读全文';btn.dataset.playing='';return;
  }
  btn.textContent='⏹ 停止朗读';btn.dataset.playing='1';
  speechSynthesis.cancel();
  var sentences=(A[idx].body.join(' ')).match(/[^.!?]+[.!?]*/g)||[A[idx].body.join(' ')];
  var i=0;
  function next(){
    if(i>=sentences.length||btn.dataset.playing!=='1'){
      btn.textContent='🎧 朗读全文';btn.dataset.playing='';return;
    }
    var u=new SpeechSynthesisUtterance(sentences[i].trim());
    u.lang='en-AU';u.rate=0.85;u.pitch=1;
    u.onend=function(){i++;next();};u.onerror=function(){i++;next();};
    speechSynthesis.speak(u);i++;
  }
  next();
}

function toggleWB(){document.getElementById('wb').classList.toggle('open');}
function swTab(t){
  wbTab=t;
  document.getElementById('tl').classList.toggle('active',t==='list');
  document.getElementById('tq').classList.toggle('active',t==='quiz');
  renderWB();
}
function spk(w){
  var u=new SpeechSynthesisUtterance(w);u.lang='en-AU';u.rate=0.85;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}
function renderWB(){
  var b=document.getElementById('wbody');
  if(!wb.length){b.innerHTML='<div class="empty">📝 还没有生词<br>阅读时点击单词加入</div>';return;}
  if(wbTab==='list'){
    b.innerHTML='<div style="font-size:.7rem;color:#a08060;margin-bottom:.5rem">共 '+wb.length+' 个生词</div>'
      +wb.map(function(w,i){
        return '<div class="vc"><button class="vcx" onclick="rmW('+i+')">×</button>'
          +'<div class="vcw">'+xe(w.display)+' <button class="vcsnd" onclick="spk(''+w.display.replace(/'/g,"\'")+'')">🔊</button></div>'
          +(w.ph?'<div class="vcp">'+w.ph+'</div>':'')
          +'<div class="vcm">'+w.zh+'</div>'
          +(w.ex?'<div class="vce">"'+xe(w.ex)+'"</div>':'')
          +'<div class="vcs">📖 '+xe(w.src)+'</div></div>';
      }).join('');
  }else{renderQuiz(b);}
}
function rmW(i){
  document.querySelectorAll('.w[data-cl="'+wb[i].word+'"]').forEach(function(el){el.classList.remove('sv');});
  wb.splice(i,1);document.getElementById('wbc').textContent=wb.length;renderWB();
}
function renderQuiz(b){
  if(wb.length<2){b.innerHTML='<div class="empty">需要至少 2 个生词才能测验</div>';return;}
  var idx=qIdx%wb.length,w=wb[idx];
  var wrong=wb.filter(function(_,i){return i!==idx;}).sort(function(){return Math.random()-.5;}).slice(0,3);
  var opts=wrong.map(function(x){return x.zh;}).concat([w.zh]).sort(function(){return Math.random()-.5;});
  b.innerHTML='<div style="font-size:.7rem;color:#a08060;margin-bottom:.5rem">第 '+(idx+1)+'/'+wb.length+' 题</div>'
    +'<div class="qcard"><div class="qq">这个词是什么意思？<br><strong>'+xe(w.display)+'</strong></div>'
    +'<div class="qopts">'+opts.map(function(o){
      return '<button class="qopt" onclick="chkQ(this,'+JSON.stringify(o)+','+JSON.stringify(w.zh)+')">'+xe(o)+'</button>';
    }).join('')+'</div><button class="qnxt" id="qnxt" onclick="nxtQ()">下一题 →</button></div>';
}
function chkQ(btn,chosen,correct){
  document.querySelectorAll('.qopt').forEach(function(b){b.onclick=null;});
  btn.classList.add(chosen===correct?'ok':'no');
  if(chosen!==correct) document.querySelectorAll('.qopt').forEach(function(b){if(b.textContent===correct)b.classList.add('ok');});
  document.getElementById('qnxt').style.display='block';
}
function nxtQ(){qIdx++;renderWB();}
</script>
